<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailwind CSS - 仪表盘布局</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <!-- 
    仪表盘布局示例
    
    使用 CSS Grid 创建经典的仪表盘结构:
    ┌─────────────────────┐
    │  Header (col-span)  │  ← 64px 高
    ├────────┬────────────┤
    │ Sidebar│  Content   │
    │ 240px  │  自适应    │  ← 剩余高度
    └────────┴────────────┘
    
    关键技术:
    - grid-cols-[240px_1fr] - 固定宽度 + 自适应
    - grid-rows-[64px_1fr] - 固定高度 + 自适应
    - col-span-2 - 横跨两列
  -->
  <div class="grid grid-cols-[240px_1fr] grid-rows-[64px_1fr] h-screen">
    <!-- 顶栏 (横跨两列) -->
    <header class="col-span-2 flex items-center px-6 bg-white border-b border-gray-200">
      <h1 class="text-xl font-bold text-gray-900">Dashboard</h1>
      <div class="ml-auto flex items-center gap-4">
        <button class="text-gray-600 hover:text-gray-900">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
          </svg>
        </button>
        <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white text-sm font-medium">
          A
        </div>
      </div>
    </header>

    <!-- 侧边栏 -->
    <aside class="bg-gray-900 text-white p-4">
      <nav class="flex flex-col gap-2">
        <a href="#" class="p-2 rounded bg-gray-800 hover:bg-gray-700 transition-colors">
          <div class="flex items-center gap-3">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            <span>Home</span>
          </div>
        </a>
        <a href="#" class="p-2 rounded hover:bg-gray-800 transition-colors">
          <div class="flex items-center gap-3">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
            </svg>
            <span>Analytics</span>
          </div>
        </a>
        <a href="#" class="p-2 rounded hover:bg-gray-800 transition-colors">
          <div class="flex items-center gap-3">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span>Settings</span>
          </div>
        </a>
      </nav>
    </aside>

    <!-- 主内容区 -->
    <main class="p-6 bg-gray-50 overflow-y-auto">
      <h2 class="text-2xl font-bold mb-4 text-gray-900">仪表盘布局</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- 卡片示例 -->
        <div class="p-6 bg-white rounded-lg shadow">
          <h3 class="text-lg font-bold mb-2 text-gray-900">总用户数</h3>
          <p class="text-3xl font-bold text-blue-600">1,234</p>
          <p class="text-sm text-gray-500 mt-2">↑ 12% 较上月</p>
        </div>
        <div class="p-6 bg-white rounded-lg shadow">
          <h3 class="text-lg font-bold mb-2 text-gray-900">活跃用户</h3>
          <p class="text-3xl font-bold text-green-600">856</p>
          <p class="text-sm text-gray-500 mt-2">↑ 8% 较上月</p>
        </div>
        <div class="p-6 bg-white rounded-lg shadow">
          <h3 class="text-lg font-bold mb-2 text-gray-900">总收入</h3>
          <p class="text-3xl font-bold text-purple-600">$45,678</p>
          <p class="text-sm text-gray-500 mt-2">↑ 23% 较上月</p>
        </div>
      </div>

      <!-- 说明文字 -->
      <div class="mt-8 p-4 bg-blue-50 border-l-4 border-blue-500 rounded">
        <h4 class="font-bold text-blue-900 mb-2">布局说明</h4>
        <ul class="text-sm text-blue-800 space-y-1">
          <li><strong>Grid 列定义:</strong> <code class="bg-blue-100 px-1 rounded">grid-cols-[240px_1fr]</code> - 240px 固定宽度侧边栏 + 自适应主内容</li>
          <li><strong>Grid 行定义:</strong> <code class="bg-blue-100 px-1 rounded">grid-rows-[64px_1fr]</code> - 64px 固定高度顶栏 + 自适应内容</li>
          <li><strong>顶栏横跨:</strong> <code class="bg-blue-100 px-1 rounded">col-span-2</code> - 横跨两列</li>
          <li><strong>全屏高度:</strong> <code class="bg-blue-100 px-1 rounded">h-screen</code> - 100vh</li>
        </ul>
      </div>
    </main>
  </div>

  <script>
    console.log('🎨 仪表盘布局结构:');
    console.log('┌─────────┬─────────────┐');
    console.log('│  Header (col-span-2)  │  ← 64px 高');
    console.log('├─────────┼─────────────┤');
    console.log('│ Sidebar │   Content   │');
    console.log('│ 240px   │   自适应    │  ← 剩余高度');
    console.log('└─────────┴─────────────┘');
  </script>
</body>
</html>
