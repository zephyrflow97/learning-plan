<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>响应式卡片网格 - Tailwind CSS 示例</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
  <!-- 
    响应式卡片网格示例
    演示: Grid布局、响应式断点、悬停效果、过渡动画
  -->
  
  <div class="max-w-7xl mx-auto">
    <h1 class="text-3xl font-bold mb-8">产品展示</h1>
    
    <!-- 
      响应式网格:
      - 默认 (手机 < 768px): 1 列
      - md (平板 ≥ 768px): 2 列
      - lg (笔记本 ≥ 1024px): 3 列
    -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      
      <!-- 卡片 1 -->
      <div class="
        bg-white rounded-xl shadow-md overflow-hidden
        transition-all duration-300
        hover:shadow-2xl hover:-translate-y-2
        cursor-pointer
      ">
        <!-- 图片区域 -->
        <div class="h-48 bg-gradient-to-br from-blue-400 to-blue-600 flex items-center justify-center">
          <svg class="w-16 h-16 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
        </div>
        
        <!-- 内容区域 -->
        <div class="p-6">
          <h3 class="text-xl font-bold mb-2 text-gray-900">基础版</h3>
          <p class="text-gray-600 mb-4">
            适合个人用户和小型团队的基础功能套餐。
          </p>
          <div class="flex items-baseline gap-2 mb-4">
            <span class="text-3xl font-bold text-gray-900">$9</span>
            <span class="text-gray-500">/月</span>
          </div>
          <ul class="space-y-2 mb-6">
            <li class="flex items-center gap-2 text-sm text-gray-600">
              <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
              </svg>
              5 个项目
            </li>
            <li class="flex items-center gap-2 text-sm text-gray-600">
              <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
              </svg>
              10GB 存储空间
            </li>
            <li class="flex items-center gap-2 text-sm text-gray-600">
              <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
              </svg>
              基础支持
            </li>
          </ul>
          <button class="w-full py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">
            选择方案
          </button>
        </div>
      </div>

      <!-- 卡片 2 (推荐) -->
      <div class="
        bg-white rounded-xl shadow-md overflow-hidden
        transition-all duration-300
        hover:shadow-2xl hover:-translate-y-2
        cursor-pointer
        ring-2 ring-purple-500
      ">
        <!-- 推荐标签 -->
        <div class="bg-purple-500 text-white text-center py-2 text-sm font-medium">
          🌟 最受欢迎
        </div>
        
        <!-- 图片区域 -->
        <div class="h-48 bg-gradient-to-br from-purple-400 to-purple-600 flex items-center justify-center">
          <svg class="w-16 h-16 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
          </svg>
        </div>
        
        <!-- 内容区域 -->
        <div class="p-6">
          <h3 class="text-xl font-bold mb-2 text-gray-900">专业版</h3>
          <p class="text-gray-600 mb-4">
            适合成长型团队,提供高级功能和优先支持。
          </p>
          <div class="flex items-baseline gap-2 mb-4">
            <span class="text-3xl font-bold text-gray-900">$29</span>
            <span class="text-gray-500">/月</span>
          </div>
          <ul class="space-y-2 mb-6">
            <li class="flex items-center gap-2 text-sm text-gray-600">
              <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
              </svg>
              无限项目
            </li>
            <li class="flex items-center gap-2 text-sm text-gray-600">
              <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
              </svg>
              100GB 存储空间
            </li>
            <li class="flex items-center gap-2 text-sm text-gray-600">
              <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
              </svg>
              优先支持
            </li>
            <li class="flex items-center gap-2 text-sm text-gray-600">
              <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
              </svg>
              高级分析
            </li>
          </ul>
          <button class="w-full py-2 bg-purple-600 text-white rounded hover:bg-purple-700 transition">
            选择方案
          </button>
        </div>
      </div>

      <!-- 卡片 3 -->
      <div class="
        bg-white rounded-xl shadow-md overflow-hidden
        transition-all duration-300
        hover:shadow-2xl hover:-translate-y-2
        cursor-pointer
      ">
        <!-- 图片区域 -->
        <div class="h-48 bg-gradient-to-br from-orange-400 to-orange-600 flex items-center justify-center">
          <svg class="w-16 h-16 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
          </svg>
        </div>
        
        <!-- 内容区域 -->
        <div class="p-6">
          <h3 class="text-xl font-bold mb-2 text-gray-900">企业版</h3>
          <p class="text-gray-600 mb-4">
            为大型组织定制的完整解决方案和专属服务。
          </p>
          <div class="flex items-baseline gap-2 mb-4">
            <span class="text-3xl font-bold text-gray-900">定制</span>
          </div>
          <ul class="space-y-2 mb-6">
            <li class="flex items-center gap-2 text-sm text-gray-600">
              <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
              </svg>
              所有专业版功能
            </li>
            <li class="flex items-center gap-2 text-sm text-gray-600">
              <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
              </svg>
              无限存储空间
            </li>
            <li class="flex items-center gap-2 text-sm text-gray-600">
              <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
              </svg>
              24/7 专属支持
            </li>
            <li class="flex items-center gap-2 text-sm text-gray-600">
              <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
              </svg>
              定制开发
            </li>
          </ul>
          <button class="w-full py-2 bg-orange-600 text-white rounded hover:bg-orange-700 transition">
            联系我们
          </button>
        </div>
      </div>

    </div>
  </div>

  <script>
    console.log('📱 响应式断点测试:');
    console.log('  当前窗口宽度:', window.innerWidth, 'px');
    console.log('  手机 (< 768px): 1 列');
    console.log('  平板 (768px-1024px): 2 列');
    console.log('  笔记本 (≥ 1024px): 3 列');
    console.log('');
    console.log('🎨 卡片交互效果:');
    console.log('  hover:shadow-2xl → 阴影加深');
    console.log('  hover:-translate-y-2 → 向上移动 8px');
    console.log('  transition-all duration-300 → 300ms 平滑过渡');
    console.log('');
    console.log('💡 设计细节:');
    console.log('  - 推荐卡片有紫色边框 (ring-2 ring-purple-500)');
    console.log('  - 每个卡片有渐变色背景图');
    console.log('  - 列表项用绿色勾选图标');
  </script>
</body>
</html>
