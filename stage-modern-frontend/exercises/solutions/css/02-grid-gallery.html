<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid 图片画廊</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      padding: 20px;
      background-color: #f5f5f5;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    /* Grid 容器 */
    .gallery {
      display: grid;
      
      /* 自动响应的核心代码 */
      grid-template-columns: repeat(
        auto-fit,           /* 自动计算列数,空列会折叠 */
        minmax(200px, 1fr)  /* 每列最小 200px,最大平分剩余空间 */
      );
      
      gap: 16px; /* 网格间距 */
    }

    .gallery-item {
      aspect-ratio: 4 / 3; /* 固定宽高比 4:3 */
      overflow: hidden;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s;
      background-color: #ddd;
    }

    .gallery-item:hover {
      transform: scale(1.05); /* 悬停放大效果 */
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* 裁剪图片填充容器,保持宽高比 */
      display: block;    /* 移除图片下方的默认空隙 */
    }
  </style>
</head>
<body>
  <h1>🖼️ 响应式图片画廊</h1>
  
  <div class="gallery">
    <div class="gallery-item"></div>
    <div class="gallery-item"></div>
    <div class="gallery-item"></div>
    <div class="gallery-item"></div>
    <div class="gallery-item"></div>
    <div class="gallery-item"></div>
    <div class="gallery-item"></div>
    <div class="gallery-item"></div>
  </div>

  <script>
    // 日志:监控 Grid 的实际列数
    function logGridColumns() {
      const gallery = document.querySelector('.gallery');
      const computedStyle = window.getComputedStyle(gallery);
      const columns = computedStyle.gridTemplateColumns.split(' ').length;
      
      console.log(`[Grid 布局] 当前列数: ${columns} (窗口宽度: ${window.innerWidth}px)`);
    }

    window.addEventListener('load', logGridColumns);
    window.addEventListener('resize', logGridColumns);
  </script>
</body>
</html>
